# Build properties template for Proclaim development
# Copy this file to build.properties and configure for your environment
# Or run: composer setup (interactive wizard)

# REQUIRED: Full path to your Joomla installation
builder.joomla_path=/path/to/your/joomla

# OPTIONAL: Subdirectory within a Joomla path (usually empty)
builder.joomla_dir=

# Joomla version for testing and installation
joomla.version=5.4.2

# Database configuration (for future automated Joomla setup)
builder.host=localhost
builder.db_host=localhost
builder.db_user=
builder.db_pass=
builder.db_name=

# Joomla admin credentials (for future automated setup)
builder.joomla_username=
builder.joomla_password=
builder.joomla_email=example@example.com