COM_PROCLAIM_TOUR_WHATS_NEW_TITLE="Co je nového v Proclaimu 10.1"
COM_PROCLAIM_TOUR_WHATS_NEW_DESC="Objevte nové funkce a vylepšení v Proclaim 10.1. Tato prohlídka vás provede nejnovějšími přírůstky."

COM_PROCLAIM_TOUR_WELCOME_TITLE="Vítejte v Proclaim 10.1!"
COM_PROCLAIM_TOUR_WELCOME_DESC="Děkujeme za aktualizaci Proclaimu! Tato verze obsahuje skvělé nové funkce. Pojďme se na ni rychle podívat, co je nového."

; Archived Messages Feature Steps
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_TITLE="Novinka: Zobrazení archivovaných zpráv"
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_DESC="Proclaim nyní podporuje zobrazování archivovaných zpráv na frontendu! Tato funkce vám umožňuje archivovat starší zprávy a zároveň je zpřístupnit vašim návštěvníkům."

COM_PROCLAIM_TOUR_ARCHIVED_STEP2_TITLE="Správa zpráv"
COM_PROCLAIM_TOUR_ARCHIVED_STEP2_DESC="Klikněte na Zprávy v postranním panelu pro zobrazení a správu vašich kázání a studií. Zde můžete archivovat starší zprávy nebo zprávy, které již nejsou aktivně propagovány."

COM_PROCLAIM_TOUR_ARCHIVED_STEP3_TITLE="Filtrovat podle stavu"
COM_PROCLAIM_TOUR_ARCHIVED_STEP3_DESC="Pomocí filtru Stav si můžete zobrazit zprávy typu Publikováno, Archivováno nebo Vyřazeno z koše. Vyberte možnost „Archivováno“ a zobrazte všechny archivované zprávy, nebo vyberte zprávu a pomocí panelu nástrojů změňte její stav."

COM_PROCLAIM_TOUR_ARCHIVED_STEP4_TITLE="Nastavení šablony"
COM_PROCLAIM_TOUR_ARCHIVED_STEP4_DESC="V postranním panelu klikněte na Šablony. Každá šablona má nová nastavení, která ovládají, jak se archivované zprávy zobrazují na frontendu."

COM_PROCLAIM_TOUR_ARCHIVED_STEP5_TITLE="Možnosti zobrazení archivu"
COM_PROCLAIM_TOUR_ARCHIVED_STEP5_DESC="V nastavení šablony najdete: <ul><li><strong>Výchozí zobrazení archivovaných zpráv</strong> – Vyberte, zda chcete zobrazit pouze publikované zprávy, pouze archivované zprávy nebo obojí</li><li><strong>Zobrazit odznak archivu</strong> – Zobrazení odznaku u archivovaných zpráv</li></ul>"

; Layout Editor Feature Steps
COM_PROCLAIM_TOUR_LAYOUT_STEP1_TITLE="Nové: Editor vizuálního rozvržení"
COM_PROCLAIM_TOUR_LAYOUT_STEP1_DESC="Proclaim nyní obsahuje editor rozvržení s funkcí drag-and-drop pro šablony! Vizuálně uspořádejte prvky zobrazení v řádcích bez nutnosti úpravy složitých nastavení."

COM_PROCLAIM_TOUR_LAYOUT_STEP2_TITLE="Používání editoru rozvržení"
COM_PROCLAIM_TOUR_LAYOUT_STEP2_DESC="Otevřete libovolnou šablonu a klikněte na kartu Editor rozvržení. Přetáhněte prvky z postranního panelu na řádky a vytvořte si rozvržení. Kliknutím na ikonu ozubeného kola na libovolném prvku nakonfigurujte jeho nastavení. Změny se automaticky synchronizují s klasickou konfigurací rozbalovací nabídky."

; CPanel Improvements Feature Steps
COM_PROCLAIM_TOUR_CPANEL_STEP1_TITLE="Vylepšený ovládací panel"
COM_PROCLAIM_TOUR_CPANEL_STEP1_DESC="Ovládací panel byl přepracován a nyní obsahuje vylepšené interakce tlačítek. Najeďte myší na libovolné tlačítko pro zobrazení vizuální zpětné vazby, díky čemuž je navigace intuitivnější."

COM_PROCLAIM_TOUR_CPANEL_STEP2_TITLE="Podpora tmavého režimu"
COM_PROCLAIM_TOUR_CPANEL_STEP2_DESC="Proclaim nyní plně podporuje tmavý režim Joomly! Ovládací panel a všechna administrativní rozhraní se automaticky přizpůsobí vašemu preferovanému barevnému schématu."

; Accessibility Improvements Feature Steps
COM_PROCLAIM_TOUR_A11Y_STEP1_TITLE="Vylepšení přístupnosti"
COM_PROCLAIM_TOUR_A11Y_STEP1_DESC="Tato verze obsahuje významná vylepšení přístupnosti, která splňují standardy WCAG 2.1 úrovně A. Vylepšena byla podpora čteček obrazovky, navigace pomocí klávesnice a správa fokusu."

; Tour Completion
COM_PROCLAIM_TOUR_COMPLETE_TITLE="Prohlídka dokončena!"
COM_PROCLAIM_TOUR_COMPLETE_DESC="Dokončili jste prohlídku novinek! Více informací naleznete v naší dokumentaci na adrese christianwebministries.org. Máte-li dotazy, podívejte se na fórum podpory."
