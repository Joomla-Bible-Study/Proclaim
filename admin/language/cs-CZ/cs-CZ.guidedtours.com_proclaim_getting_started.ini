COM_PROCLAIM_TOUR_GETTING_STARTED_TITLE="Začínáme s Proclaimem"
COM_PROCLAIM_TOUR_GETTING_STARTED_DESC="Naučte se základy nastavení Proclaim pro váš sbor. Tato prohlídka vás provede vytvářením učitelů, sérií, zpráv a šablon."

COM_PROCLAIM_TOUR_GS_WELCOME_TITLE="Vítejte v Proclaimu!"
COM_PROCLAIM_TOUR_GS_WELCOME_DESC="Proclaim vám pomůže spravovat a zobrazovat biblická studia a kázání na vašem webu Joomla. Tato prohlídka vás provede základními kroky nastavení, abyste mohli začít."

COM_PROCLAIM_TOUR_GS_CPANEL_TITLE="Ovládací panel"
COM_PROCLAIM_TOUR_GS_CPANEL_DESC = "This is the Proclaim Control Panel. From here you can access all areas of the component. The main sections you'll use are:<ul><li><strong>Messages</strong> - Your sermons and Bible studies</li><li><strong>Teachers</strong> - Pastors and speakers</li><li><strong>Theme</strong> - Sermon series and topics</li><li><strong>Templates</strong> - Control how content displays</li></ul>"

COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_TITLE="Krok 1: Vytvořte učitele"
COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_DESC="Nejprve si nastavme učitele. Klikněte na Učitelé v postranním panelu pro správu pastorů a řečníků."

COM_PROCLAIM_TOUR_GS_TEACHERS_TITLE="Řízení učitelů"
COM_PROCLAIM_TOUR_GS_TEACHERS_DESC="Toto je seznam učitelů. Klikněte na tlačítko <strong>Nový</strong> v panelu nástrojů a přidejte učitele. Každý učitel potřebuje alespoň jméno. Můžete také přidat titul, telefonní číslo, e-mail, obrázek a životopisné informace."

COM_PROCLAIM_TOUR_GS_SERIES_NAV_TITLE = "Step 2: Create a Theme"
COM_PROCLAIM_TOUR_GS_SERIES_NAV_DESC = "Next, let's create a sermon series. Click Theme in the sidebar to organize your messages into series."

COM_PROCLAIM_TOUR_GS_SERIES_TITLE = "Managing Theme"
COM_PROCLAIM_TOUR_GS_SERIES_DESC = "This is the Theme list. Click <strong>New</strong> to create a series. A series groups related messages together, like a multi-week study through a book of the Bible. Add a title, description, and optionally an image."

COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_TITLE="Krok 3: Vytvořte zprávy"
COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_DESC="Nyní přidejme vaše první kázání nebo biblické studium. Klikněte na Zprávy v postranním panelu."

COM_PROCLAIM_TOUR_GS_MESSAGES_TITLE="Správa zpráv"
COM_PROCLAIM_TOUR_GS_MESSAGES_DESC = "This is where you manage your sermons and Bible studies. Click <strong>New</strong> to create a message. Key fields include:<ul><li><strong>Title</strong> - The sermon title</li><li><strong>Teacher</strong> - Who delivered the message</li><li><strong>Scripture</strong> - Bible book, chapter, and verse</li><li><strong>Theme</strong> - Which series it belongs to</li><li><strong>Study Text</strong> - Sermon notes or outline</li></ul>You can also add media files (audio, video) on the Media tab."

COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_TITLE="Krok 4: Konfigurace šablon"
COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_DESC="Šablony ovládají, jak se vaše zprávy zobrazují na frontendu. V postranním panelu klikněte na Šablony."

COM_PROCLAIM_TOUR_GS_TEMPLATES_TITLE="Správa šablon"
COM_PROCLAIM_TOUR_GS_TEMPLATES_DESC="Šablony definují rozvržení a styl vašich stránek kázání. Výchozí šablona funguje ihned po instalaci, ale můžete si ji přizpůsobit. Otevřete šablonu a nakonfigurujte:<ul><li><strong>Editor rozvržení</strong> – Vizuální rozvržení s funkcí drag-and-drop</li><li><strong>Nastavení zobrazení</strong> – Které prvky se mají zobrazovat</li><li><strong>Nastavení stylu</strong> – Barvy a formátování</li></ul>"

COM_PROCLAIM_TOUR_GS_MENU_TITLE="Poslední krok: Vytvořte položku nabídky"
COM_PROCLAIM_TOUR_GS_MENU_DESC="Chcete-li zobrazit svá kázání na frontendu, vytvořte položku nabídky Joomla:<ol><li>Přejděte na <strong>Nabídky</strong> v postranním panelu Joomla</li><li>Klikněte na <strong>Nový</strong> pro přidání položky nabídky</li><li>Nastavte typ položky nabídky na <strong>Prohlásit > Seznam kázání</strong></li><li>Vyberte šablonu v možnostech položky nabídky</li><li>Uložte a vaše kázání se zobrazí na frontendu!</li></ol>"

COM_PROCLAIM_TOUR_GS_COMPLETE_TITLE="Jste připraveni!"
COM_PROCLAIM_TOUR_GS_COMPLETE_DESC="Nyní znáte základy Proclaimu! Podrobnou dokumentaci naleznete na <a href='https://www.christianwebministries.org/documentation/8-proclaim/19-proclaim-10-x.html' target='_blank'>christianwebministries.org</a>. Tuto prohlídku můžete kdykoli znovu spustit z nabídky Průvodce Joomlou."

; Start button (shared with other tours)
COM_PROCLAIM_TOUR_START_BUTTON="Zahájit prohlídku"
