COM_PROCLAIM_TOUR_GETTING_STARTED_TITLE="Aan de slag met Proclaim"
COM_PROCLAIM_TOUR_GETTING_STARTED_DESC="Leer de basisprincipes van het instellen van Proclaim voor je kerk. Deze rondleiding leidt je door het proces van het aanmaken van docenten, series, boodschappen en sjablonen."

COM_PROCLAIM_TOUR_GS_WELCOME_TITLE="Welkom bij Proclaim!"
COM_PROCLAIM_TOUR_GS_WELCOME_DESC="Met Proclaim kunt u Bijbelstudies en preken beheren en weergeven op uw Joomla-website. Deze handleiding leidt u door de essentiële installatiestappen om aan de slag te gaan."

COM_PROCLAIM_TOUR_GS_CPANEL_TITLE="Het bedieningspaneel"
COM_PROCLAIM_TOUR_GS_CPANEL_DESC = "This is the Proclaim Control Panel. From here you can access all areas of the component. The main sections you'll use are:<ul><li><strong>Messages</strong> - Your sermons and Bible studies</li><li><strong>Teachers</strong> - Pastors and speakers</li><li><strong>Theme</strong> - Sermon series and topics</li><li><strong>Templates</strong> - Control how content displays</li></ul>"

COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_TITLE="Stap 1: Leerkrachten opleiden"
COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_DESC="Laten we eerst uw docenten instellen. Klik op 'Docenten' in de zijbalk om uw predikanten en sprekers te beheren."

COM_PROCLAIM_TOUR_GS_TEACHERS_TITLE="Het managen van docenten"
COM_PROCLAIM_TOUR_GS_TEACHERS_DESC="Dit is de lijst met docenten. Klik op <strong>Nieuw</strong> in de werkbalk om een docent toe te voegen. Elke docent heeft minimaal een naam nodig. Je kunt ook een functietitel, telefoonnummer, e-mailadres, afbeelding en biografische informatie toevoegen."

COM_PROCLAIM_TOUR_GS_SERIES_NAV_TITLE = "Step 2: Create a Theme"
COM_PROCLAIM_TOUR_GS_SERIES_NAV_DESC = "Next, let's create a sermon series. Click Theme in the sidebar to organize your messages into series."

COM_PROCLAIM_TOUR_GS_SERIES_TITLE = "Managing Theme"
COM_PROCLAIM_TOUR_GS_SERIES_DESC = "This is the Theme list. Click <strong>New</strong> to create a series. A series groups related messages together, like a multi-week study through a book of the Bible. Add a title, description, and optionally an image."

COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_TITLE="Stap 3: Berichten maken"
COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_DESC="Laten we nu je eerste preek of Bijbelstudie toevoegen. Klik op 'Berichten' in de zijbalk."

COM_PROCLAIM_TOUR_GS_MESSAGES_TITLE="Berichten beheren"
COM_PROCLAIM_TOUR_GS_MESSAGES_DESC = "This is where you manage your sermons and Bible studies. Click <strong>New</strong> to create a message. Key fields include:<ul><li><strong>Title</strong> - The sermon title</li><li><strong>Teacher</strong> - Who delivered the message</li><li><strong>Scripture</strong> - Bible book, chapter, and verse</li><li><strong>Theme</strong> - Which series it belongs to</li><li><strong>Study Text</strong> - Sermon notes or outline</li></ul>You can also add media files (audio, video) on the Media tab."

COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_TITLE="Stap 4: Sjablonen configureren"
COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_DESC="Sjablonen bepalen hoe uw berichten op de website worden weergegeven. Klik op Sjablonen in de zijbalk."

COM_PROCLAIM_TOUR_GS_TEMPLATES_TITLE="Sjablonen beheren"
COM_PROCLAIM_TOUR_GS_TEMPLATES_DESC="Sjablonen bepalen de lay-out en stijl van uw preekpagina's. Het standaardsjabloon werkt direct, maar u kunt het aanpassen. Open een sjabloon om het volgende te configureren: <ul><li><strong>Lay-outeditor</strong> - Visuele lay-out slepen en neerzetten</li><li><strong>Weergave-instellingen</strong> - Welke elementen moeten worden weergegeven</li><li><strong>Stijl-instellingen</strong> - Kleuren en opmaak</li></ul>"

COM_PROCLAIM_TOUR_GS_MENU_TITLE="Laatste stap: een menu-item aanmaken"
COM_PROCLAIM_TOUR_GS_MENU_DESC="Om uw preken op de frontend weer te geven, maakt u een Joomla-menu-item aan:<ol><li>Ga naar <strong>Menu's</strong> in de Joomla-zijbalk</li><li>Klik op <strong>Nieuw</strong> om een menu-item toe te voegen</li><li>Stel het menu-itemtype in op <strong>Proclaim > Prekenlijst</strong></li><li>Selecteer uw sjabloon in de menu-itemopties</li><li>Sla op en uw preken verschijnen op de frontend!</li></ol>"

COM_PROCLAIM_TOUR_GS_COMPLETE_TITLE="Je bent er klaar voor!"
COM_PROCLAIM_TOUR_GS_COMPLETE_DESC="Je kent nu de basisprincipes van Proclaim! Voor gedetailleerde documentatie ga je naar <a href='https://www.christianwebministries.org/documentation/8-proclaim/19-proclaim-10-x.html' target='_blank'>christianwebministries.org</a>. Je kunt deze rondleiding op elk gewenst moment hervatten via het menu 'Rondleidingen' in Joomla."

