COM_PROCLAIM_TOUR_WHATS_NEW_TITLE="Wat is er nieuw in Proclaim 10.1?"
COM_PROCLAIM_TOUR_WHATS_NEW_DESC="Ontdek de nieuwe functies en verbeteringen in Proclaim 10.1. Deze rondleiding leidt u door de nieuwste toevoegingen."

COM_PROCLAIM_TOUR_WELCOME_TITLE="Welkom bij Proclaim 10.1!"
COM_PROCLAIM_TOUR_WELCOME_DESC="Bedankt voor de update van Proclaim! Deze versie bevat spannende nieuwe functies. Laten we even snel kijken wat er nieuw is."

; Archived Messages Feature Steps
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_TITLE="Nieuw: Weergave van gearchiveerde berichten"
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_DESC="Proclaim ondersteunt nu het weergeven van gearchiveerde berichten op de frontend! Met deze functie kunt u oudere berichten archiveren en ze toch beschikbaar houden voor uw bezoekers."

COM_PROCLAIM_TOUR_ARCHIVED_STEP2_TITLE="Berichten beheren"
COM_PROCLAIM_TOUR_ARCHIVED_STEP2_DESC="Klik op 'Berichten' in de zijbalk om uw preken en studies te bekijken en te beheren. Hier kunt u oudere berichten of berichten die niet langer actief worden gepromoot, archiveren."

COM_PROCLAIM_TOUR_ARCHIVED_STEP3_TITLE="Filteren op status"
COM_PROCLAIM_TOUR_ARCHIVED_STEP3_DESC="Gebruik het statusfilter om gepubliceerde, gearchiveerde of verwijderde berichten te bekijken. Selecteer 'Gearchiveerd' om al uw gearchiveerde berichten te zien, of selecteer een bericht en gebruik de werkbalk om de status ervan te wijzigen."

COM_PROCLAIM_TOUR_ARCHIVED_STEP4_TITLE="Sjablooninstellingen"
COM_PROCLAIM_TOUR_ARCHIVED_STEP4_DESC="Klik op Sjablonen in de zijbalk. Elk sjabloon heeft nieuwe instellingen waarmee je kunt bepalen hoe gearchiveerde berichten op de website worden weergegeven."

COM_PROCLAIM_TOUR_ARCHIVED_STEP5_TITLE="Archiefweergaveopties"
COM_PROCLAIM_TOUR_ARCHIVED_STEP5_DESC="In de sjablooninstellingen vindt u: <ul><li><strong>Standaard: Gearchiveerde berichten weergeven</strong> - Kies ervoor om alleen gepubliceerde berichten, alleen gearchiveerde berichten of beide weer te geven</li><li><strong>Archiefbadge weergeven</strong> - Toon een badge bij gearchiveerde berichten</li></ul>"

; Layout Editor Feature Steps
COM_PROCLAIM_TOUR_LAYOUT_STEP1_TITLE="Nieuw: Visuele lay-outeditor"
COM_PROCLAIM_TOUR_LAYOUT_STEP1_DESC="Proclaim bevat nu een drag-and-drop lay-outeditor voor sjablonen! Rangschik weergave-elementen visueel over rijen zonder complexe instellingen te hoeven bewerken."

COM_PROCLAIM_TOUR_LAYOUT_STEP2_TITLE="De lay-outeditor gebruiken"
COM_PROCLAIM_TOUR_LAYOUT_STEP2_DESC="Open een sjabloon en klik op het tabblad Lay-outeditor. Sleep elementen vanuit de zijbalk naar rijen om je lay-out samen te stellen. Klik op het tandwielpictogram bij een element om de instellingen aan te passen. Wijzigingen worden automatisch gesynchroniseerd met de klassieke dropdown-configuratie."

; CPanel Improvements Feature Steps
COM_PROCLAIM_TOUR_CPANEL_STEP1_TITLE="Verbeterd bedieningspaneel"
COM_PROCLAIM_TOUR_CPANEL_STEP1_DESC="Het bedieningspaneel is opnieuw ontworpen met verbeterde knopinteractie. Beweeg de muis over een knop om visuele feedback te zien, waardoor de navigatie intuïtiever wordt."

COM_PROCLAIM_TOUR_CPANEL_STEP2_TITLE="Ondersteuning voor de donkere modus"
COM_PROCLAIM_TOUR_CPANEL_STEP2_DESC="Proclaim biedt nu volledige ondersteuning voor de donkere modus van Joomla! Het configuratiescherm en alle beheerdersinterfaces passen zich automatisch aan uw voorkeurskleurenschema aan."

; Accessibility Improvements Feature Steps
COM_PROCLAIM_TOUR_A11Y_STEP1_TITLE="Toegankelijkheidsverbeteringen"
COM_PROCLAIM_TOUR_A11Y_STEP1_DESC="Deze release bevat aanzienlijke verbeteringen op het gebied van toegankelijkheid om te voldoen aan de WCAG 2.1 niveau A-normen. Ondersteuning voor schermlezers, toetsenbordnavigatie en focusbeheer zijn allemaal verbeterd."

; Tour Completion
COM_PROCLAIM_TOUR_COMPLETE_TITLE="Rondleiding voltooid!"
COM_PROCLAIM_TOUR_COMPLETE_DESC="Je hebt de rondleiding 'Wat is nieuw' voltooid! Ga voor meer informatie naar onze documentatie op christianwebministries.org. Als je vragen hebt, kun je terecht op het ondersteuningsforum."
