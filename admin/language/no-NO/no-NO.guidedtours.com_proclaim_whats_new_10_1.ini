COM_PROCLAIM_TOUR_WHATS_NEW_TITLE="Hva er nytt i Proclaim 10.1"
COM_PROCLAIM_TOUR_WHATS_NEW_DESC="Oppdag de nye funksjonene og forbedringene i Proclaim 10.1. Denne omvisningen vil guide deg gjennom de nyeste tilleggene."

COM_PROCLAIM_TOUR_WELCOME_TITLE="Velkommen til Proclaim 10.1!"
COM_PROCLAIM_TOUR_WELCOME_DESC="Takk for at du oppdaterte Proclaim! Denne versjonen inneholder spennende nye funksjoner. La oss ta en rask omvisning for å se hva som er nytt."

; Archived Messages Feature Steps
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_TITLE="Ny: Visning av arkiverte meldinger"
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_DESC="Proclaim støtter nå visning av arkiverte meldinger på brukergrensesnittet! Denne funksjonen lar deg arkivere eldre meldinger samtidig som de er tilgjengelige for besøkende."

COM_PROCLAIM_TOUR_ARCHIVED_STEP2_TITLE="Administrere meldinger"
COM_PROCLAIM_TOUR_ARCHIVED_STEP2_DESC="Klikk på Meldinger i sidefeltet for å se og administrere prekenene og studiene dine. Herfra kan du arkivere meldinger som er eldre eller ikke lenger aktivt promoteres."

COM_PROCLAIM_TOUR_ARCHIVED_STEP3_TITLE="Filtrer etter status"
COM_PROCLAIM_TOUR_ARCHIVED_STEP3_DESC="Bruk statusfilteret for å se publiserte, arkiverte eller papirkurvsmeldinger. Velg «Arkivert» for å se alle arkiverte meldinger, eller velg en melding og bruk verktøylinjen for å endre statusen."

COM_PROCLAIM_TOUR_ARCHIVED_STEP4_TITLE="Malinnstillinger"
COM_PROCLAIM_TOUR_ARCHIVED_STEP4_DESC="Klikk på Maler i sidefeltet. Hver mal har nye innstillinger som styrer hvordan arkiverte meldinger vises på brukergrensesnittet."

COM_PROCLAIM_TOUR_ARCHIVED_STEP5_TITLE="Visningsalternativer for arkiv"
COM_PROCLAIM_TOUR_ARCHIVED_STEP5_DESC="I malinnstillingene finner du: <ul><li><strong>Standard Vis arkiverte</strong> – Velg å vise Kun publiserte, Kun arkiverte eller begge deler</li><li><strong>Vis arkivmerke</strong> – Vis et merke på arkiverte meldinger</li></ul>"

; Layout Editor Feature Steps
COM_PROCLAIM_TOUR_LAYOUT_STEP1_TITLE="Nyhet: Visuell layoutredigerer"
COM_PROCLAIM_TOUR_LAYOUT_STEP1_DESC="Proclaim inkluderer nå en dra-og-slipp-layoutredigerer for maler! Arranger visuelt visningselementer på tvers av rader uten å redigere komplekse innstillinger."

COM_PROCLAIM_TOUR_LAYOUT_STEP2_TITLE="Bruke oppsettredigereren"
COM_PROCLAIM_TOUR_LAYOUT_STEP2_DESC="Åpne en hvilken som helst mal og klikk på fanen Layoutredigering. Dra elementer fra sidefeltet til rader for å bygge oppsettet ditt. Klikk på tannhjulikonet på et hvilket som helst element for å konfigurere innstillingene. Endringer synkroniseres automatisk med den klassiske rullegardinmenyen."

; CPanel Improvements Feature Steps
COM_PROCLAIM_TOUR_CPANEL_STEP1_TITLE="Forbedret kontrollpanel"
COM_PROCLAIM_TOUR_CPANEL_STEP1_DESC="Kontrollpanelet har blitt redesignet med forbedret knappeinteraksjon. Hold musepekeren over en hvilken som helst knapp for å se visuell tilbakemelding, noe som gjør navigasjonen mer intuitiv."

COM_PROCLAIM_TOUR_CPANEL_STEP2_TITLE="Støtte for mørk modus"
COM_PROCLAIM_TOUR_CPANEL_STEP2_DESC="Proclaim støtter nå Joomlas mørke modus fullt ut! Kontrollpanelet og alle administrative grensesnitt tilpasser seg automatisk til ditt foretrukne fargevalg."

; Accessibility Improvements Feature Steps
COM_PROCLAIM_TOUR_A11Y_STEP1_TITLE="Tilgjengelighetsforbedringer"
COM_PROCLAIM_TOUR_A11Y_STEP1_DESC="Denne utgivelsen inkluderer betydelige forbedringer av tilgjengeligheten for å oppfylle WCAG 2.1 nivå A-standardene. Støtte for skjermlesere, tastaturnavigasjon og fokushåndtering er alle forbedret."

; Tour Completion
COM_PROCLAIM_TOUR_COMPLETE_TITLE="Turen er fullført!"
COM_PROCLAIM_TOUR_COMPLETE_DESC="Du har fullført omvisningen i nyheter! Gå til dokumentasjonen vår på christianwebministries.org for mer informasjon. Hvis du har spørsmål, kan du sjekke supportforumet."
