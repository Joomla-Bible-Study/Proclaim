COM_PROCLAIM_TOUR_GETTING_STARTED_TITLE="Komme i gang med Proclaim"
COM_PROCLAIM_TOUR_GETTING_STARTED_DESC="Lær det grunnleggende om å sette opp Proclaim for kirken din. Denne omvisningen veileder deg gjennom hvordan du lager lærere, serier, meldinger og maler."

COM_PROCLAIM_TOUR_GS_WELCOME_TITLE="Velkommen til Proclaim!"
COM_PROCLAIM_TOUR_GS_WELCOME_DESC="Proclaim hjelper deg med å administrere og vise bibelstudier og prekener på Joomla-nettstedet ditt. Denne omvisningen vil veilede deg gjennom de viktigste oppsettstrinnene for å komme i gang."

COM_PROCLAIM_TOUR_GS_CPANEL_TITLE="Kontrollpanelet"
COM_PROCLAIM_TOUR_GS_CPANEL_DESC = "This is the Proclaim Control Panel. From here you can access all areas of the component. The main sections you'll use are:<ul><li><strong>Messages</strong> - Your sermons and Bible studies</li><li><strong>Teachers</strong> - Pastors and speakers</li><li><strong>Theme</strong> - Sermon series and topics</li><li><strong>Templates</strong> - Control how content displays</li></ul>"

COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_TITLE="Trinn 1: Opprett lærere"
COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_DESC="La oss først sette opp lærerne dine. Klikk på Lærere i sidefeltet for å administrere pastorene og talerne dine."

COM_PROCLAIM_TOUR_GS_TEACHERS_TITLE="Administrere lærere"
COM_PROCLAIM_TOUR_GS_TEACHERS_DESC="Dette er lærerlisten. Klikk på <strong>Ny</strong> i verktøylinjen for å legge til en lærer. Hver lærer trenger minst ett navn. Du kan også legge til tittel, telefonnummer, e-post, bilde og biografisk informasjon."

COM_PROCLAIM_TOUR_GS_SERIES_NAV_TITLE = "Step 2: Create a Theme"
COM_PROCLAIM_TOUR_GS_SERIES_NAV_DESC = "Next, let's create a sermon series. Click Theme in the sidebar to organize your messages into series."

COM_PROCLAIM_TOUR_GS_SERIES_TITLE = "Managing Theme"
COM_PROCLAIM_TOUR_GS_SERIES_DESC = "This is the Theme list. Click <strong>New</strong> to create a series. A series groups related messages together, like a multi-week study through a book of the Bible. Add a title, description, and optionally an image."

COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_TITLE="Trinn 3: Opprett meldinger"
COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_DESC="La oss nå legge til din første preken eller bibelstudie. Klikk på Meldinger i sidefeltet."

COM_PROCLAIM_TOUR_GS_MESSAGES_TITLE="Administrere meldinger"
COM_PROCLAIM_TOUR_GS_MESSAGES_DESC = "This is where you manage your sermons and Bible studies. Click <strong>New</strong> to create a message. Key fields include:<ul><li><strong>Title</strong> - The sermon title</li><li><strong>Teacher</strong> - Who delivered the message</li><li><strong>Scripture</strong> - Bible book, chapter, and verse</li><li><strong>Theme</strong> - Which series it belongs to</li><li><strong>Study Text</strong> - Sermon notes or outline</li></ul>You can also add media files (audio, video) on the Media tab."

COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_TITLE="Trinn 4: Konfigurer maler"
COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_DESC="Maler styrer hvordan meldingene dine vises på brukergrensesnittet. Klikk på Maler i sidefeltet."

COM_PROCLAIM_TOUR_GS_TEMPLATES_TITLE="Administrere maler"
COM_PROCLAIM_TOUR_GS_TEMPLATES_DESC="Maler definerer layout og stil for prekensidene dine. Standardmalen fungerer som standard, men du kan tilpasse den. Åpne en mal for å konfigurere:<ul><li><strong>Layoutredigering</strong> - Dra-og-slipp visuell layout</li><li><strong>Visningsinnstillinger</strong> - Hvilke elementer som skal vises</li><li><strong>Stilinnstillinger</strong> - Farger og formatering</li></ul>"

COM_PROCLAIM_TOUR_GS_MENU_TITLE="Siste trinn: Opprett et menyelement"
COM_PROCLAIM_TOUR_GS_MENU_DESC="For å vise prekenene dine på frontend, opprett et Joomla-menyelement:<ol><li>Gå til <strong>Menyer</strong> i Joomla-sidefeltet</li><li>Klikk på <strong>Ny</strong> for å legge til et menyelement</li><li>Angi menyelementtypen til <strong>Forkynn > Prekenliste</strong></li><li>Velg malen din i menyelementalternativene</li><li>Lagre, og prekenene dine vil vises på frontend!</li></ol>"

COM_PROCLAIM_TOUR_GS_COMPLETE_TITLE="Du er klar!"
COM_PROCLAIM_TOUR_GS_COMPLETE_DESC="Nå kjenner du det grunnleggende om Proclaim! For detaljert dokumentasjon, besøk <a href='https://www.christianwebministries.org/documentation/8-proclaim/19-proclaim-10-x.html' target='_blank'>christianwebministries.org</a>. Du kan starte denne omvisningen på nytt når som helst fra Joomla Guided Tours-menyen."

; Start button (shared with other tours)
COM_PROCLAIM_TOUR_START_BUTTON="Start turen"
