COM_PROCLAIM_TOUR_GETTING_STARTED_TITLE="Első lépések a Proclaimmal"
COM_PROCLAIM_TOUR_GETTING_STARTED_DESC="Ismerd meg a Proclaim egyházad számára történő beállításának alapjait. Ez a bemutató végigvezet a tanítók, sorozatok, üzenetek és sablonok létrehozásán."

COM_PROCLAIM_TOUR_GS_WELCOME_TITLE="Üdvözlünk a Proclaimban!"
COM_PROCLAIM_TOUR_GS_WELCOME_DESC="A Proclaim segít a bibliatanulmányozások és prédikációk kezelésében és megjelenítésében a Joomla webhelyeden. Ez a bemutató végigvezet a legfontosabb beállítási lépéseken."

COM_PROCLAIM_TOUR_GS_CPANEL_TITLE="A Vezérlőpult"
COM_PROCLAIM_TOUR_GS_CPANEL_DESC = "This is the Proclaim Control Panel. From here you can access all areas of the component. The main sections you'll use are:<ul><li><strong>Messages</strong> - Your sermons and Bible studies</li><li><strong>Teachers</strong> - Pastors and speakers</li><li><strong>Theme</strong> - Sermon series and topics</li><li><strong>Templates</strong> - Control how content displays</li></ul>"

COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_TITLE="1. lépés: Tanárok létrehozása"
COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_DESC="Először is állítsuk be a tanáraidat. Kattints a Tanárok elemre az oldalsávon a lelkészek és előadók kezeléséhez."

COM_PROCLAIM_TOUR_GS_TEACHERS_TITLE="Tanárok irányítása"
COM_PROCLAIM_TOUR_GS_TEACHERS_DESC="Ez a Tanárok listája. Tanár hozzáadásához kattintson az <strong>Új</strong> gombra az eszköztáron. Minden tanárnak legalább egy nevére van szüksége. Hozzáadhat titulust, telefonszámot, e-mail címet, képet és életrajzi adatokat is."

COM_PROCLAIM_TOUR_GS_SERIES_NAV_TITLE = "Step 2: Create a Theme"
COM_PROCLAIM_TOUR_GS_SERIES_NAV_DESC = "Next, let's create a sermon series. Click Theme in the sidebar to organize your messages into series."

COM_PROCLAIM_TOUR_GS_SERIES_TITLE = "Managing Theme"
COM_PROCLAIM_TOUR_GS_SERIES_DESC = "This is the Theme list. Click <strong>New</strong> to create a series. A series groups related messages together, like a multi-week study through a book of the Bible. Add a title, description, and optionally an image."

COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_TITLE="3. lépés: Üzenetek létrehozása"
COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_DESC="Most adjuk hozzá az első prédikációdat vagy bibliatanulmányozásodat. Kattints az Üzenetek elemre az oldalsávon."

COM_PROCLAIM_TOUR_GS_MESSAGES_TITLE="Üzenetek kezelése"
COM_PROCLAIM_TOUR_GS_MESSAGES_DESC = "This is where you manage your sermons and Bible studies. Click <strong>New</strong> to create a message. Key fields include:<ul><li><strong>Title</strong> - The sermon title</li><li><strong>Teacher</strong> - Who delivered the message</li><li><strong>Scripture</strong> - Bible book, chapter, and verse</li><li><strong>Theme</strong> - Which series it belongs to</li><li><strong>Study Text</strong> - Sermon notes or outline</li></ul>You can also add media files (audio, video) on the Media tab."

COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_TITLE="4. lépés: Sablonok konfigurálása"
COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_DESC="A sablonok szabályozzák, hogy az üzenetek hogyan jelenjenek meg a kezelőfelületen. Kattintson a Sablonok elemre az oldalsávon."

COM_PROCLAIM_TOUR_GS_TEMPLATES_TITLE="Sablonok kezelése"
COM_PROCLAIM_TOUR_GS_TEMPLATES_DESC="A sablonok határozzák meg a prédikációid oldalainak elrendezését és stílusát. Az alapértelmezett sablon azonnal használható, de testreszabhatod. Nyiss meg egy sablont a következők konfigurálásához:<ul><li><strong>Elrendezésszerkesztő</strong> - Húzd és vidd vizuális elrendezés</li><li><strong>Megjelenítési beállítások</strong> - Mely elemek jelenjenek meg</li><li><strong>Stílusbeállítások</strong> - Színek és formázás</li></ul>"

COM_PROCLAIM_TOUR_GS_MENU_TITLE="Utolsó lépés: Menüpont létrehozása"
COM_PROCLAIM_TOUR_GS_MENU_DESC="A prédikációid megjelenítéséhez a felhasználói felületen hozz létre egy Joomla menüpontot:<ol><li>Lépj a <strong>Menük</strong> menüpontra a Joomla oldalsávon.</li><li>Kattints az <strong>Új</strong> gombra egy menüpont hozzáadásához.</li><li>Állítsd a menüpont típusát <strong>Hirdetés > Prédikációlista</strong></li><li>Válaszd ki a sablont a menüpontok között.</li><li>Mentés, és a prédikációid megjelennek a felhasználói felületen!</li></ol>"

COM_PROCLAIM_TOUR_GS_COMPLETE_TITLE="Készen állsz!"
COM_PROCLAIM_TOUR_GS_COMPLETE_DESC="Most már ismered a Proclaim alapjait! Részletes dokumentációért látogass el a <a href='https://www.christianwebministries.org/documentation/8-proclaim/19-proclaim-10-x.html' target='_blank'>christianwebministries.org</a> oldalra. Ezt a túrát bármikor újraindíthatod a Joomla Vezetett túrák menüből."

; Start button (shared with other tours)
COM_PROCLAIM_TOUR_START_BUTTON="Túra indítása"
