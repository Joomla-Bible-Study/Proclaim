COM_PROCLAIM_TOUR_WHATS_NEW_TITLE="Újdonságok a Proclaim 10.1-ben"
COM_PROCLAIM_TOUR_WHATS_NEW_DESC="Fedezze fel a Proclaim 10.1 új funkcióit és fejlesztéseit. Ez a bemutató végigvezeti Önt a legújabb kiegészítéseken."

COM_PROCLAIM_TOUR_WELCOME_TITLE="Üdvözlünk a Proclaim 10.1-ben!"
COM_PROCLAIM_TOUR_WELCOME_DESC="Köszönjük a Proclaim frissítését! Ez a verzió izgalmas új funkciókat tartalmaz. Vessünk egy gyors áttekintést az újdonságokról."

; Archived Messages Feature Steps
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_TITLE="Új: Archivált üzenetek megjelenítése"
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_DESC="A Proclaim mostantól támogatja az archivált üzenetek megjelenítését a felhasználói felületen! Ez a funkció lehetővé teszi a régebbi üzenetek archiválását, miközben továbbra is elérhetővé teszi azokat a látogatók számára."

COM_PROCLAIM_TOUR_ARCHIVED_STEP2_TITLE="Üzenetek kezelése"
COM_PROCLAIM_TOUR_ARCHIVED_STEP2_DESC="Kattints az Üzenetek elemre az oldalsávon a prédikációid és tanulmányaid megtekintéséhez és kezeléséhez. Innen archiválhatod a régebbi vagy már nem aktívan népszerűsített üzeneteket."

COM_PROCLAIM_TOUR_ARCHIVED_STEP3_TITLE="Szűrés állapot szerint"
COM_PROCLAIM_TOUR_ARCHIVED_STEP3_DESC="Az Állapot szűrővel megtekintheti a Közzétett, Archivált vagy Kukába helyezett üzeneteket. Válassza az „Archivált” lehetőséget az összes archivált üzenet megtekintéséhez, vagy jelöljön ki egy üzenetet, és az eszköztár segítségével módosítsa az állapotát."

COM_PROCLAIM_TOUR_ARCHIVED_STEP4_TITLE="Sablonbeállítások"
COM_PROCLAIM_TOUR_ARCHIVED_STEP4_DESC="Kattintson a Sablonok elemre az oldalsávon. Minden sablonhoz új beállítások tartoznak, amelyek szabályozzák, hogyan jelenjenek meg az archivált üzenetek a felhasználói felületen."

COM_PROCLAIM_TOUR_ARCHIVED_STEP5_TITLE="Archívum megjelenítési beállításai"
COM_PROCLAIM_TOUR_ARCHIVED_STEP5_DESC="A sablonbeállításokban a következőket találja: <ul><li><strong>Alapértelmezett archivált elemek megjelenítése</strong> – Válassza ki, hogy csak közzétett, csak archivált vagy mindkettő jelenjen meg</li><li><strong>Archív jelvény megjelenítése</strong> – Jelvény megjelenítése az archivált üzeneteken</li></ul>"

; Layout Editor Feature Steps
COM_PROCLAIM_TOUR_LAYOUT_STEP1_TITLE="Új: Vizuális elrendezés szerkesztő"
COM_PROCLAIM_TOUR_LAYOUT_STEP1_DESC="A Proclaim mostantól tartalmaz egy drag-and-drop elrendezésszerkesztőt a sablonokhoz! Vizuálisan rendezheti el a megjelenítési elemeket sorok között összetett beállítások szerkesztése nélkül."

COM_PROCLAIM_TOUR_LAYOUT_STEP2_TITLE="Az Elrendezésszerkesztő használata"
COM_PROCLAIM_TOUR_LAYOUT_STEP2_DESC="Nyisson meg egy tetszőleges sablont, és kattintson az Elrendezésszerkesztő fülre. Húzza az elemeket az oldalsávról a sorokra az elrendezés felépítéséhez. Kattintson a fogaskerék ikonra bármelyik elemen a beállítások konfigurálásához. A változtatások automatikusan szinkronizálódnak a klasszikus legördülő konfigurációval."

; CPanel Improvements Feature Steps
COM_PROCLAIM_TOUR_CPANEL_STEP1_TITLE="Továbbfejlesztett kezelőpanel"
COM_PROCLAIM_TOUR_CPANEL_STEP1_DESC="A Vezérlőpult újratervezésen esett át, és javult a gombok interakciója. Vizuális visszajelzést kaphat bármelyik gomb fölé húzva, így a navigáció intuitívabb lett."

COM_PROCLAIM_TOUR_CPANEL_STEP2_TITLE="Sötét mód támogatása"
COM_PROCLAIM_TOUR_CPANEL_STEP2_DESC="A Proclaim mostantól teljes mértékben támogatja a Joomla sötét módját! A Vezérlőpult és az összes adminisztrációs felület automatikusan igazodik a kívánt színsémához."

; Accessibility Improvements Feature Steps
COM_PROCLAIM_TOUR_A11Y_STEP1_TITLE="Akadálymentesítési fejlesztések"
COM_PROCLAIM_TOUR_A11Y_STEP1_DESC="Ez a kiadás jelentős akadálymentesítési fejlesztéseket tartalmaz a WCAG 2.1 A szintű szabványoknak való megfelelés érdekében. A képernyőolvasók támogatása, a billentyűzetnavigáció és a fókuszkezelés is továbbfejlesztésre került."

; Tour Completion
COM_PROCLAIM_TOUR_COMPLETE_TITLE="Túra befejezve!"
COM_PROCLAIM_TOUR_COMPLETE_DESC="Befejezted az Újdonságok bemutatót! További információkért látogasd meg a dokumentációnkat a christianwebministries.org oldalon. Ha kérdésed van, látogasd meg a támogatási fórumot."
