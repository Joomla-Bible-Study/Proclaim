COM_PROCLAIM_TOUR_WHATS_NEW_TITLE="Novedades de Proclaim 10.1"
COM_PROCLAIM_TOUR_WHATS_NEW_DESC="Descubre las nuevas funciones y mejoras de Proclaim 10.1. Este recorrido te guiará por las últimas novedades."

COM_PROCLAIM_TOUR_WELCOME_TITLE="¡Bienvenido a Proclaim 10.1!"
COM_PROCLAIM_TOUR_WELCOME_DESC="¡Gracias por actualizar Proclaim! Esta versión incluye nuevas funciones interesantes. Veamos rápidamente las novedades."

; Archived Messages Feature Steps
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_TITLE="Nuevo: Visualización de mensajes archivados"
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_DESC="¡Proclaim ahora permite mostrar mensajes archivados en la interfaz! Esta función te permite archivar mensajes antiguos y mantenerlos disponibles para tus visitantes."

COM_PROCLAIM_TOUR_ARCHIVED_STEP2_TITLE="Administrar mensajes"
COM_PROCLAIM_TOUR_ARCHIVED_STEP2_DESC="Haz clic en Mensajes en la barra lateral para ver y administrar tus sermones y estudios. Desde aquí puedes archivar los mensajes antiguos o que ya no se promocionan activamente."

COM_PROCLAIM_TOUR_ARCHIVED_STEP3_TITLE="Filtrar por estado"
COM_PROCLAIM_TOUR_ARCHIVED_STEP3_DESC="Usa el filtro de estado para ver los mensajes publicados, archivados o eliminados. Selecciona "Archivado" para ver todos tus mensajes archivados o selecciona un mensaje y usa la barra de herramientas para cambiar su estado."

COM_PROCLAIM_TOUR_ARCHIVED_STEP4_TITLE="Configuración de la plantilla"
COM_PROCLAIM_TOUR_ARCHIVED_STEP4_DESC="Haz clic en Plantillas en la barra lateral. Cada plantilla tiene nuevas configuraciones que controlan cómo se muestran los mensajes archivados en la interfaz."

COM_PROCLAIM_TOUR_ARCHIVED_STEP5_TITLE="Opciones de visualización del archivo"
COM_PROCLAIM_TOUR_ARCHIVED_STEP5_DESC="En la configuración de la plantilla, encontrarás: <ul><li><strong>Mostrar archivados predeterminado</strong>: elige mostrar solo publicados, solo archivados o ambos.</li><li><strong>Mostrar insignia de archivo</strong>: muestra una insignia en los mensajes archivados.</li></ul>"

; Layout Editor Feature Steps
COM_PROCLAIM_TOUR_LAYOUT_STEP1_TITLE="Nuevo: Editor de diseño visual"
COM_PROCLAIM_TOUR_LAYOUT_STEP1_DESC="¡Proclaim ahora incluye un editor de diseño de plantillas con función de arrastrar y soltar! Organiza visualmente los elementos de visualización en filas sin modificar configuraciones complejas."

COM_PROCLAIM_TOUR_LAYOUT_STEP2_TITLE="Uso del editor de diseño"
COM_PROCLAIM_TOUR_LAYOUT_STEP2_DESC="Abra cualquier plantilla y haga clic en la pestaña Editor de Diseño. Arrastre elementos desde la barra lateral a las filas para crear su diseño. Haga clic en el icono del engranaje en cualquier elemento para configurar sus ajustes. Los cambios se sincronizan automáticamente con la configuración clásica del menú desplegable."

; CPanel Improvements Feature Steps
COM_PROCLAIM_TOUR_CPANEL_STEP1_TITLE="Panel de control mejorado"
COM_PROCLAIM_TOUR_CPANEL_STEP1_DESC="El Panel de Control se ha rediseñado con interacciones de botones mejoradas. Pase el cursor sobre cualquier botón para ver información visual, lo que hace que la navegación sea más intuitiva."

COM_PROCLAIM_TOUR_CPANEL_STEP2_TITLE="Compatibilidad con el modo oscuro"
COM_PROCLAIM_TOUR_CPANEL_STEP2_DESC="¡Proclaim ahora es totalmente compatible con el modo oscuro de Joomla! El Panel de Control y todas las interfaces administrativas se adaptan automáticamente a tu paleta de colores preferida."

; Accessibility Improvements Feature Steps
COM_PROCLAIM_TOUR_A11Y_STEP1_TITLE="Mejoras de accesibilidad"
COM_PROCLAIM_TOUR_A11Y_STEP1_DESC="Esta versión incluye importantes mejoras de accesibilidad para cumplir con los estándares WCAG 2.1 Nivel A. Se han mejorado la compatibilidad con lectores de pantalla, la navegación con teclado y la gestión del enfoque."

; Tour Completion
COM_PROCLAIM_TOUR_COMPLETE_TITLE="¡Tour completo!"
COM_PROCLAIM_TOUR_COMPLETE_DESC="¡Has completado el recorrido de novedades! Para más información, visita nuestra documentación en christianwebministries.org. Si tienes alguna pregunta, consulta el foro de soporte."
