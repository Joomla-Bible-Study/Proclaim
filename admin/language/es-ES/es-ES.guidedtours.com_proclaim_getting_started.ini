COM_PROCLAIM_TOUR_GETTING_STARTED_TITLE="Introducción a Proclaim"
COM_PROCLAIM_TOUR_GETTING_STARTED_DESC="Aprenda los conceptos básicos para configurar Proclaim en su iglesia. Este recorrido le guiará en la creación de maestros, series, mensajes y plantillas."

COM_PROCLAIM_TOUR_GS_WELCOME_TITLE="¡Bienvenido a Proclaim!"
COM_PROCLAIM_TOUR_GS_WELCOME_DESC="Proclaim te ayuda a gestionar y mostrar estudios bíblicos y sermones en tu sitio web Joomla. Este tutorial te guiará por los pasos esenciales de configuración para empezar."

COM_PROCLAIM_TOUR_GS_CPANEL_TITLE="El panel de control"
COM_PROCLAIM_TOUR_GS_CPANEL_DESC = "This is the Proclaim Control Panel. From here you can access all areas of the component. The main sections you'll use are:<ul><li><strong>Messages</strong> - Your sermons and Bible studies</li><li><strong>Teachers</strong> - Pastors and speakers</li><li><strong>Theme</strong> - Sermon series and topics</li><li><strong>Templates</strong> - Control how content displays</li></ul>"

COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_TITLE="Paso 1: Crear profesores"
COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_DESC="Primero, configuremos a tus profesores. Haz clic en "Profesores" en la barra lateral para administrar a tus pastores y oradores."

COM_PROCLAIM_TOUR_GS_TEACHERS_TITLE="Gestión de docentes"
COM_PROCLAIM_TOUR_GS_TEACHERS_DESC="Esta es la lista de profesores. Haz clic en "Nuevo" en la barra de herramientas para añadir un profesor. Cada profesor necesita al menos un nombre. También puedes añadir un título, teléfono, correo electrónico, imagen e información biográfica."

COM_PROCLAIM_TOUR_GS_SERIES_NAV_TITLE = "Step 2: Create a Theme"
COM_PROCLAIM_TOUR_GS_SERIES_NAV_DESC = "Next, let's create a sermon series. Click Theme in the sidebar to organize your messages into series."

COM_PROCLAIM_TOUR_GS_SERIES_TITLE = "Managing Theme"
COM_PROCLAIM_TOUR_GS_SERIES_DESC = "This is the Theme list. Click <strong>New</strong> to create a series. A series groups related messages together, like a multi-week study through a book of the Bible. Add a title, description, and optionally an image."

COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_TITLE="Paso 3: Crear mensajes"
COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_DESC="Ahora, agreguemos tu primer sermón o estudio bíblico. Haz clic en "Mensajes" en la barra lateral."

COM_PROCLAIM_TOUR_GS_MESSAGES_TITLE="Administrar mensajes"
COM_PROCLAIM_TOUR_GS_MESSAGES_DESC = "This is where you manage your sermons and Bible studies. Click <strong>New</strong> to create a message. Key fields include:<ul><li><strong>Title</strong> - The sermon title</li><li><strong>Teacher</strong> - Who delivered the message</li><li><strong>Scripture</strong> - Bible book, chapter, and verse</li><li><strong>Theme</strong> - Which series it belongs to</li><li><strong>Study Text</strong> - Sermon notes or outline</li></ul>You can also add media files (audio, video) on the Media tab."

COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_TITLE="Paso 4: Configurar plantillas"
COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_DESC="Las plantillas controlan cómo aparecen tus mensajes en la interfaz. Haz clic en Plantillas en la barra lateral."

COM_PROCLAIM_TOUR_GS_TEMPLATES_TITLE="Administrar plantillas"
COM_PROCLAIM_TOUR_GS_TEMPLATES_DESC="Las plantillas definen el diseño y el estilo de las páginas de tus sermones. La plantilla predeterminada funciona de fábrica, pero puedes personalizarla. Abre una plantilla para configurar: <ul><li><strong>Editor de diseño</strong>: Diseño visual con función de arrastrar y soltar</li><li><strong>Configuración de visualización</strong>: Qué elementos mostrar</li><li><strong>Configuración de estilo</strong>: Colores y formato</li></ul>"

COM_PROCLAIM_TOUR_GS_MENU_TITLE="Paso final: crear un elemento de menú"
COM_PROCLAIM_TOUR_GS_MENU_DESC="Para mostrar sus sermones en la interfaz, cree un elemento de menú de Joomla: <ol><li>Vaya a <strong>Menús</strong> en la barra lateral de Joomla</li><li>Haga clic en <strong>Nuevo</strong> para agregar un elemento de menú</li><li>Establezca el Tipo de elemento de menú en <strong>Proclamar > Lista de sermones</strong></li><li>Seleccione su plantilla en las opciones del elemento de menú</li><li>¡Guarde y sus sermones aparecerán en la interfaz!</li></ol>"

COM_PROCLAIM_TOUR_GS_COMPLETE_TITLE="¡Estás listo!"
COM_PROCLAIM_TOUR_GS_COMPLETE_DESC="¡Ya conoces los fundamentos de Proclaim! Para obtener documentación detallada, visita <a href='https://www.christianwebministries.org/documentation/8-proclaim/19-proclaim-10-x.html' target='_blank'>christianwebministries.org</a>. Puedes reiniciar esta visita guiada en cualquier momento desde el menú de Visitas Guiadas de Joomla."

