; Simple Mode - Post Install Messages
COM_PROCLAIM_POSTINSTALL_SIMPLEMODE_TITLE = "Simple Mode Is Enabled"
COM_PROCLAIM_POSTINSTALL_SIMPLEMODE_DESC = "Proclaim includes a Simple Mode that provides a streamlined interface for entering and displaying messages. Simple Mode uses predefined grid-based templates and reduces the number of configuration options shown in the admin panel. If you need full control over templates, layout elements, media players, and advanced display options, you can turn Simple Mode OFF in the Administration settings. Simple Mode can be toggled on or off at any time without losing your data."
COM_PROCLAIM_POSTINSTALL_SIMPLEMODE_ACTION = "Go to Administration Settings"

; Archived Messages Feature - Post Install Messages
COM_PROCLAIM_POSTINSTALL_ARCHIVED_TITLE = "New Feature: Archived Messages Display"
COM_PROCLAIM_POSTINSTALL_ARCHIVED_DESC = "Proclaim now supports displaying archived messages on the frontend! You can configure how archived messages are shown in your templates, including options to show only published messages, only archived messages, or both. Each archived message can display a badge to indicate its archived status."
COM_PROCLAIM_POSTINSTALL_ARCHIVED_ACTION = "Configure Archive Settings in Templates"

