COM_PROCLAIM_TOUR_WHATS_NEW_TITLE = "What's New in Proclaim 10.1"
COM_PROCLAIM_TOUR_WHATS_NEW_DESC = "Discover the new features and improvements in Proclaim 10.1. This tour will guide you through the latest additions."

COM_PROCLAIM_TOUR_WELCOME_TITLE = "Welcome to Proclaim 10.1!"
COM_PROCLAIM_TOUR_WELCOME_DESC = "Thank you for updating Proclaim! This version includes exciting new features. Let's take a quick tour to see what's new."

; Archived Messages Feature Steps
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_TITLE = "New: Archived Messages Display"
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_DESC = "Proclaim now supports displaying archived messages on the frontend! This feature allows you to archive older messages while still making them available to your visitors."

COM_PROCLAIM_TOUR_ARCHIVED_STEP2_TITLE = "Managing Messages"
COM_PROCLAIM_TOUR_ARCHIVED_STEP2_DESC = "Click on Messages in the sidebar to view and manage your sermons. From here you can archive messages that are older or no longer actively promoted."

COM_PROCLAIM_TOUR_ARCHIVED_STEP3_TITLE = "Filter by Status"
COM_PROCLAIM_TOUR_ARCHIVED_STEP3_DESC = "Use the Status filter to view Published, Archived, or Trashed messages. Select 'Archived' to see all your archived messages, or select a message and use the toolbar to change its status."

COM_PROCLAIM_TOUR_ARCHIVED_STEP4_TITLE = "Template Settings"
COM_PROCLAIM_TOUR_ARCHIVED_STEP4_DESC = "Click on Templates in the sidebar. Each template has new settings that control how archived messages are displayed on the frontend."

COM_PROCLAIM_TOUR_ARCHIVED_STEP5_TITLE = "Archive Display Options"
COM_PROCLAIM_TOUR_ARCHIVED_STEP5_DESC = "In template settings, you'll find: <ul><li><strong>Default Show Archived</strong> - Choose to show Published Only, Archived Only, or Both</li><li><strong>Show Archive Badge</strong> - Display a badge on archived messages</li></ul>"

; Layout Editor Feature Steps
COM_PROCLAIM_TOUR_LAYOUT_STEP1_TITLE = "New: Visual Layout Editor"
COM_PROCLAIM_TOUR_LAYOUT_STEP1_DESC = "Proclaim now includes a drag-and-drop Layout Editor for templates! Visually arrange display elements across rows without editing complex settings."

COM_PROCLAIM_TOUR_LAYOUT_STEP2_TITLE = "Using the Layout Editor"
COM_PROCLAIM_TOUR_LAYOUT_STEP2_DESC = "Open any template and click the Layout Editor tab. Drag elements from the sidebar onto rows to build your layout. Click the gear icon on any element to configure its settings. Changes sync automatically with the classic dropdown configuration."

; CPanel Improvements Feature Steps
COM_PROCLAIM_TOUR_CPANEL_STEP1_TITLE = "Improved Control Panel"
COM_PROCLAIM_TOUR_CPANEL_STEP1_DESC = "The Control Panel has been redesigned with improved button interactions. Hover over any button to see visual feedback, making navigation more intuitive."

COM_PROCLAIM_TOUR_CPANEL_STEP2_TITLE = "Dark Mode Support"
COM_PROCLAIM_TOUR_CPANEL_STEP2_DESC = "Proclaim now fully supports Joomla's dark mode! The Control Panel and all administrative interfaces automatically adapt to your preferred color scheme."

; Accessibility Improvements Feature Steps
COM_PROCLAIM_TOUR_A11Y_STEP1_TITLE = "Accessibility Enhancements"
COM_PROCLAIM_TOUR_A11Y_STEP1_DESC = "This release includes significant accessibility improvements to meet WCAG 2.1 Level A standards. Screen reader support, keyboard navigation, and focus management have all been enhanced."

; Tour Completion
COM_PROCLAIM_TOUR_COMPLETE_TITLE = "Tour Complete!"
COM_PROCLAIM_TOUR_COMPLETE_DESC = "You've completed the What's New tour! For more information, visit our documentation at christianwebministries.org. If you have questions, check the support forum."
