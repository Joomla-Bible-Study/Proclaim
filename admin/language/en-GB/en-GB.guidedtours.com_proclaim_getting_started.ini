COM_PROCLAIM_TOUR_GETTING_STARTED_TITLE = "Getting Started with Proclaim"
COM_PROCLAIM_TOUR_GETTING_STARTED_DESC = "Learn the basics of setting up Proclaim for your church. This tour walks you through creating teachers, series, messages, and templates."

COM_PROCLAIM_TOUR_GS_WELCOME_TITLE = "Welcome to Proclaim!"
COM_PROCLAIM_TOUR_GS_WELCOME_DESC = "Proclaim helps you manage and display Bible studies and sermons on your Joomla website. This tour will guide you through the essential setup steps to get started."

COM_PROCLAIM_TOUR_GS_CPANEL_TITLE = "The Control Panel"
COM_PROCLAIM_TOUR_GS_CPANEL_DESC = "This is the Proclaim Control Panel. From here you can access all areas of the component. The main sections you'll use are:<ul><li><strong>Messages</strong> - Your sermons and Bible studies</li><li><strong>Teachers</strong> - Pastors and speakers</li><li><strong>Series</strong> - Sermon series and topics</li><li><strong>Templates</strong> - Control how content displays</li></ul>"

COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_TITLE = "Step 1: Create Teachers"
COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_DESC = "First, let's set up your teachers. Click Teachers in the sidebar to manage your pastors and speakers."

COM_PROCLAIM_TOUR_GS_TEACHERS_TITLE = "Managing Teachers"
COM_PROCLAIM_TOUR_GS_TEACHERS_DESC = "This is the Teachers list. Click <strong>New</strong> in the toolbar to add a teacher. Each teacher needs at least a name. You can also add a title, phone, email, image, and biographical information."

COM_PROCLAIM_TOUR_GS_SERIES_NAV_TITLE = "Step 2: Create a Series"
COM_PROCLAIM_TOUR_GS_SERIES_NAV_DESC = "Next, let's create a sermon series. Click Series in the sidebar to organize your messages into series."

COM_PROCLAIM_TOUR_GS_SERIES_TITLE = "Managing Series"
COM_PROCLAIM_TOUR_GS_SERIES_DESC = "This is the Series list. Click <strong>New</strong> to create a series. A series groups related messages together, like a multi-week study through a book of the Bible. Add a title, description, and optionally an image."

COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_TITLE = "Step 3: Create Messages"
COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_DESC = "Now let's add your first sermon or Bible study. Click Messages in the sidebar."

COM_PROCLAIM_TOUR_GS_MESSAGES_TITLE = "Managing Messages"
COM_PROCLAIM_TOUR_GS_MESSAGES_DESC = "This is where you manage your sermons and Bible studies. Click <strong>New</strong> to create a message. Key fields include:<ul><li><strong>Title</strong> - The sermon title</li><li><strong>Teacher</strong> - Who delivered the message</li><li><strong>Scripture</strong> - Bible book, chapter, and verse</li><li><strong>Series</strong> - Which series it belongs to</li><li><strong>Study Text</strong> - Sermon notes or outline</li></ul>You can also add media files (audio, video) on the Media tab."

COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_TITLE = "Step 4: Configure Templates"
COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_DESC = "Templates control how your messages appear on the frontend. Click Templates in the sidebar."

COM_PROCLAIM_TOUR_GS_TEMPLATES_TITLE = "Managing Templates"
COM_PROCLAIM_TOUR_GS_TEMPLATES_DESC = "Templates define the layout and style of your sermon pages. The default template works out of the box, but you can customize it. Open a template to configure:<ul><li><strong>Layout Editor</strong> - Drag-and-drop visual layout</li><li><strong>Display settings</strong> - Which elements to show</li><li><strong>Style settings</strong> - Colors and formatting</li></ul>"

COM_PROCLAIM_TOUR_GS_MENU_TITLE = "Final Step: Create a Menu Item"
COM_PROCLAIM_TOUR_GS_MENU_DESC = "To display your sermons on the frontend, create a Joomla menu item:<ol><li>Go to <strong>Menus</strong> in the Joomla sidebar</li><li>Click <strong>New</strong> to add a menu item</li><li>Set the Menu Item Type to <strong>Proclaim > Sermon List</strong></li><li>Select your template in the menu item options</li><li>Save and your sermons will appear on the frontend!</li></ol>"

COM_PROCLAIM_TOUR_GS_COMPLETE_TITLE = "You're Ready!"
COM_PROCLAIM_TOUR_GS_COMPLETE_DESC = "You now know the basics of Proclaim! For detailed documentation, visit <a href='https://www.christianwebministries.org/documentation/8-proclaim/19-proclaim-10-x.html' target='_blank'>christianwebministries.org</a>. You can restart this tour anytime from the Joomla Guided Tours menu."

; Start button (shared with other tours)
COM_PROCLAIM_TOUR_START_BUTTON = "Start Tour"
