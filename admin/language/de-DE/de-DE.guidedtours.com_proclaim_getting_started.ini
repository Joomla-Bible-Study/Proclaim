COM_PROCLAIM_TOUR_GETTING_STARTED_TITLE="Erste Schritte mit Proclaim"
COM_PROCLAIM_TOUR_GETTING_STARTED_DESC="Lerne die Grundlagen zur Einrichtung von Proclaim für deine Gemeinde. Diese Tour führt dich durch die Erstellung von Lehrern, Predigtreihen, Botschaften und Vorlagen."

COM_PROCLAIM_TOUR_GS_WELCOME_TITLE="Willkommen bei Proclaim!"
COM_PROCLAIM_TOUR_GS_WELCOME_DESC="Proclaim hilft Ihnen, Bibelstudien und Predigten auf Ihrer Joomla-Website zu verwalten und anzuzeigen. Diese Tour führt Sie durch die wichtigsten Einrichtungsschritte für den Einstieg."

COM_PROCLAIM_TOUR_GS_CPANEL_TITLE="Das Bedienfeld"
COM_PROCLAIM_TOUR_GS_CPANEL_DESC = "This is the Proclaim Control Panel. From here you can access all areas of the component. The main sections you'll use are:<ul><li><strong>Messages</strong> - Your sermons and Bible studies</li><li><strong>Teachers</strong> - Pastors and speakers</li><li><strong>Theme</strong> - Sermon series and topics</li><li><strong>Templates</strong> - Control how content displays</li></ul>"

COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_TITLE="Schritt 1: Lehrer erstellen"
COM_PROCLAIM_TOUR_GS_TEACHERS_NAV_DESC="Zuerst richten wir Ihre Lehrer ein. Klicken Sie in der Seitenleiste auf „Lehrer“, um Ihre Pastoren und Referenten zu verwalten."

COM_PROCLAIM_TOUR_GS_TEACHERS_TITLE="Lehrermanagement"
COM_PROCLAIM_TOUR_GS_TEACHERS_DESC="Dies ist die Lehrerliste. Klicken Sie in der Symbolleiste auf <strong>Neu</strong>, um einen Lehrer hinzuzufügen. Jeder Lehrer benötigt mindestens einen Namen. Sie können außerdem einen Titel, eine Telefonnummer, eine E-Mail-Adresse, ein Bild und biografische Informationen hinzufügen."

COM_PROCLAIM_TOUR_GS_SERIES_NAV_TITLE = "Step 2: Create a Theme"
COM_PROCLAIM_TOUR_GS_SERIES_NAV_DESC = "Next, let's create a sermon series. Click Theme in the sidebar to organize your messages into series."

COM_PROCLAIM_TOUR_GS_SERIES_TITLE = "Managing Theme"
COM_PROCLAIM_TOUR_GS_SERIES_DESC = "This is the Theme list. Click <strong>New</strong> to create a series. A series groups related messages together, like a multi-week study through a book of the Bible. Add a title, description, and optionally an image."

COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_TITLE="Schritt 3: Nachrichten erstellen"
COM_PROCLAIM_TOUR_GS_MESSAGES_NAV_DESC="Fügen Sie nun Ihre erste Predigt oder Bibelstunde hinzu. Klicken Sie dazu in der Seitenleiste auf „Nachrichten“."

COM_PROCLAIM_TOUR_GS_MESSAGES_TITLE="Nachrichten verwalten"
COM_PROCLAIM_TOUR_GS_MESSAGES_DESC = "This is where you manage your sermons and Bible studies. Click <strong>New</strong> to create a message. Key fields include:<ul><li><strong>Title</strong> - The sermon title</li><li><strong>Teacher</strong> - Who delivered the message</li><li><strong>Scripture</strong> - Bible book, chapter, and verse</li><li><strong>Theme</strong> - Which series it belongs to</li><li><strong>Study Text</strong> - Sermon notes or outline</li></ul>You can also add media files (audio, video) on the Media tab."

COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_TITLE="Schritt 4: Vorlagen konfigurieren"
COM_PROCLAIM_TOUR_GS_TEMPLATES_NAV_DESC="Vorlagen steuern, wie Ihre Nachrichten im Frontend angezeigt werden. Klicken Sie in der Seitenleiste auf „Vorlagen“."

COM_PROCLAIM_TOUR_GS_TEMPLATES_TITLE="Vorlagen verwalten"
COM_PROCLAIM_TOUR_GS_TEMPLATES_DESC="Vorlagen definieren Layout und Stil Ihrer Predigtseiten. Die Standardvorlage ist sofort einsatzbereit, kann aber angepasst werden. Öffnen Sie eine Vorlage, um Folgendes zu konfigurieren: <ul><li><strong>Layout-Editor</strong> – Visuelles Layout per Drag & Drop</li><li><strong>Anzeigeeinstellungen</strong> – Anzuzeigende Elemente</li><li><strong>Stileinstellungen</strong> – Farben und Formatierung</li></ul>"

COM_PROCLAIM_TOUR_GS_MENU_TITLE="Letzter Schritt: Einen Menüpunkt erstellen"
COM_PROCLAIM_TOUR_GS_MENU_DESC="Um Ihre Predigten im Frontend anzuzeigen, erstellen Sie einen Joomla-Menüpunkt:<ol><li>Gehen Sie in der Joomla-Seitenleiste auf <strong>Menüs</strong>.</li><li>Klicken Sie auf <strong>Neu</strong>, um einen Menüpunkt hinzuzufügen.</li><li>Wählen Sie als Menüpunkttyp <strong>Proclaim > Predigtliste</strong></li><li>Wählen Sie in den Menüpunktoptionen Ihre Vorlage aus.</li><li>Speichern Sie die Änderungen, und Ihre Predigten werden im Frontend angezeigt!</li></ol>"

COM_PROCLAIM_TOUR_GS_COMPLETE_TITLE="Du bist bereit!"
COM_PROCLAIM_TOUR_GS_COMPLETE_DESC="Sie kennen nun die Grundlagen von Proclaim! Eine ausführliche Dokumentation finden Sie unter <a href='https://www.christianwebministries.org/documentation/8-proclaim/19-proclaim-10-x.html' target='_blank'>christianwebministries.org</a>. Sie können diese Tour jederzeit über das Joomla-Menü „Geführte Touren“ neu starten."

