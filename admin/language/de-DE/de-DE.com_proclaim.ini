JBS_MED_AVRELOADED_DESC="<b><u>Einbettungscode:</u></b> Fügen Sie den Einbettungscode für Ihre Medien ein. Wählen Sie für den Player „Einbettungscode“. Es ist nichts weiter erforderlich.<br /><b><u>Videoplayer-Plugin „All Videos“ oder „JPlayer“:</u></b> Geben Sie öffnende und schließende Codes wie {mp3remote}-{/mp3remote} ein. Achten Sie darauf, einen Bindestrich (-) zwischen die Codes zu setzen. Wenn Sie die Option „Alle Dateien mit All Videos abspielen“ auswählen, versucht die Komponente, den korrekten Code automatisch einzufügen, auch wenn Sie nichts eingeben. Sie können auch einen Dateinamen zwischen {} und {/} angeben. In diesem Fall übergibt die Komponente diesen Code einfach an „All Videos“.<br />Bei Bedarf können Sie Text vor oder nach dem Bindestrich einfügen. Beispiel: {mp3remote}http://-{/mp3remote} fügt diesen Text vor Ihrem Pfad und Dateinamen ein (das System entfernt den Bindestrich). Stellen Sie sicher, dass Sie auf dieser Seite die Option „Alle Videos verwenden“ aktivieren."
