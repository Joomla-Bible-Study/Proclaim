JBS_ADM_ENABLE_CSP="Inhaltssicherheitsrichtlinie"
JBS_ADM_ENABLE_CSP_DESC="Aktivieren Sie einen Content-Security-Policy-Header auf den Proclaim-Frontend-Seiten. Dadurch wird eingeschränkt, welche externen Ressourcen vom Browser geladen werden dürfen. YouTube, Vimeo und alle weiteren von Ihnen angegebenen Domains werden zugelassen."
JBS_ADM_CSP_EXTRA_SOURCES="CSP-Zusatzdomänen"
JBS_ADM_CSP_EXTRA_SOURCES_DESC="Zusätzliche Domains, die in der Content Security Policy zugelassen werden sollen. Geben Sie eine Domain pro Zeile ein (z. B. https://cdn.example.com). Diese werden den Direktiven script-src, style-src, frame-src und connect-src hinzugefügt."
JBS_TPL_BIBLE_TRANSLATION="Bibelübersetzung"
JBS_TPL_BIBLE_TRANSLATION_DESC="Wählen Sie die Bibelübersetzung aus, die für die textbasierte Darstellung der Heiligen Schrift verwendet werden soll. Es werden nur Übersetzungen angezeigt, deren Verse lokal installiert sind oder die über die ausgewählte API verfügbar sind."
