JBS_TPL_SCRIPTURE_PROVIDER="Schriftanbieter"
JBS_TPL_SCRIPTURE_PROVIDER_DESC="Wählen Sie, wie der Bibeltext abgerufen werden soll. „Lokal" liest aus Ihrer Datenbank (am schnellsten, funktioniert offline). „GetBible.net" ruft Daten über eine kostenlose API ab. „BibleGateway" bettet einen iFrame ein (ältere Version)."
JBS_ADM_SCRIPTURE_TAB="Schrift"
JBS_ADM_SCRIPTURE_PROVIDERS="Bibelanbieter"
JBS_ADM_SCRIPTURE_PROVIDERS_DESC="Bibeltextanbieter aktivieren oder deaktivieren. Lokale Übersetzungen sind immer verfügbar (DSGVO-konform, keine externen Anfragen). Online-Anbieter führen externe API-Aufrufe durch – prüfen Sie Ihre DSGVO-/Datenschutzbestimmungen, bevor Sie die Anbieter aktivieren."
JBS_ADM_SCRIPTURE_SETTINGS="Bibeltexte"
JBS_ADM_PROVIDER_LOCAL="Lokaler Bibelanbieter"
JBS_ADM_PROVIDER_LOCAL_DESC="Verwenden Sie lokal importierte Bibelübersetzungen, die in Ihrer Datenbank gespeichert sind (am schnellsten, funktioniert offline)."
JBS_ADM_PROVIDER_GETBIBLE="GetBible.net-Anbieter"
JBS_ADM_PROVIDER_GETBIBLE_DESC="Bibelstellen können über die GetBible.net-API abgerufen werden (kein API-Schlüssel erforderlich). Hinweis: Es werden serverseitige HTTP-Anfragen an getbible.net gesendet – bitte beachten Sie die Bestimmungen der DSGVO."
JBS_ADM_GDPR_MODE="DSGVO-Konformitätsmodus"
JBS_ADM_GDPR_MODE_DESC="Wenn diese Option aktiviert ist, werden alle externen API-Aufrufe (GetBible.net, API.Bible) deaktiviert. Es werden ausschließlich lokal heruntergeladene Übersetzungen verwendet. Ihre Daten verlassen Ihren Server nicht, wodurch die vollständige Einhaltung der DSGVO gewährleistet ist."
JBS_ADM_SCRIPTURE_CACHE_DAYS="Cache-Dauer (Tage)"
JBS_ADM_SCRIPTURE_CACHE_DAYS_DESC="Wie viele Tage sollen abgerufene Bibelstellen zwischengespeichert werden, bevor sie erneut vom Anbieter abgerufen werden?"
