COM_PROCLAIM_TOUR_WHATS_NEW_TITLE="Neuerungen in Proclaim 10.1"
COM_PROCLAIM_TOUR_WHATS_NEW_DESC="Entdecken Sie die neuen Funktionen und Verbesserungen in Proclaim 10.1. Diese Tour führt Sie durch die neuesten Ergänzungen."

COM_PROCLAIM_TOUR_WELCOME_TITLE="Willkommen bei Proclaim 10.1!"
COM_PROCLAIM_TOUR_WELCOME_DESC="Vielen Dank für das Update von Proclaim! Diese Version enthält spannende neue Funktionen. Werfen wir einen kurzen Blick darauf, was es Neues gibt."

; Archived Messages Feature Steps
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_TITLE="Neu: Anzeige archivierter Nachrichten"
COM_PROCLAIM_TOUR_ARCHIVED_STEP1_DESC="Proclaim unterstützt jetzt die Anzeige archivierter Nachrichten im Frontend! Mit dieser Funktion können Sie ältere Nachrichten archivieren und sie Ihren Besuchern dennoch zur Verfügung stellen."

COM_PROCLAIM_TOUR_ARCHIVED_STEP2_TITLE="Nachrichten verwalten"
COM_PROCLAIM_TOUR_ARCHIVED_STEP2_DESC="Klicken Sie in der Seitenleiste auf „Nachrichten“, um Ihre Predigten und Studien anzusehen und zu verwalten. Hier können Sie ältere oder nicht mehr aktiv beworbene Nachrichten archivieren."

COM_PROCLAIM_TOUR_ARCHIVED_STEP3_TITLE="Nach Status filtern"
COM_PROCLAIM_TOUR_ARCHIVED_STEP3_DESC="Über den Statusfilter können Sie veröffentlichte, archivierte oder in den Papierkorb verschobene Nachrichten anzeigen. Wählen Sie „Archiviert“, um alle Ihre archivierten Nachrichten anzuzeigen, oder wählen Sie eine Nachricht aus und ändern Sie deren Status über die Symbolleiste."

COM_PROCLAIM_TOUR_ARCHIVED_STEP4_TITLE="Vorlageneinstellungen"
COM_PROCLAIM_TOUR_ARCHIVED_STEP4_DESC="Klicken Sie in der Seitenleiste auf „Vorlagen“. Jede Vorlage verfügt über neue Einstellungen, die steuern, wie archivierte Nachrichten im Frontend angezeigt werden."

COM_PROCLAIM_TOUR_ARCHIVED_STEP5_TITLE="Archivanzeigeoptionen"
COM_PROCLAIM_TOUR_ARCHIVED_STEP5_DESC="In den Vorlageneinstellungen finden Sie: <ul><li><strong>Standardmäßig archivierte Nachrichten anzeigen</strong> – Wählen Sie, ob nur veröffentlichte, nur archivierte oder beide angezeigt werden sollen.</li><li><strong>Archiv-Badge anzeigen</strong> – Zeigt ein Badge für archivierte Nachrichten an.</li></ul>"

; Layout Editor Feature Steps
COM_PROCLAIM_TOUR_LAYOUT_STEP1_TITLE="Neu: Visueller Layout-Editor"
COM_PROCLAIM_TOUR_LAYOUT_STEP1_DESC="Proclaim enthält jetzt einen Drag-and-Drop-Layout-Editor für Vorlagen! Ordnen Sie Anzeigeelemente visuell über Zeilen an, ohne komplexe Einstellungen bearbeiten zu müssen."

COM_PROCLAIM_TOUR_LAYOUT_STEP2_TITLE="Verwendung des Layout-Editors"
COM_PROCLAIM_TOUR_LAYOUT_STEP2_DESC="Öffnen Sie eine beliebige Vorlage und klicken Sie auf den Tab „Layout-Editor“. Ziehen Sie Elemente aus der Seitenleiste in die Zeilen, um Ihr Layout zu erstellen. Klicken Sie auf das Zahnradsymbol eines beliebigen Elements, um dessen Einstellungen anzupassen. Änderungen werden automatisch mit der klassischen Dropdown-Konfiguration synchronisiert."

; CPanel Improvements Feature Steps
COM_PROCLAIM_TOUR_CPANEL_STEP1_TITLE="Verbesserte Bedienoberfläche"
COM_PROCLAIM_TOUR_CPANEL_STEP1_DESC="Das Bedienfeld wurde überarbeitet und die Bedienung der Schaltflächen verbessert. Bewegen Sie den Mauszeiger über eine Schaltfläche, um visuelles Feedback zu erhalten und so die Navigation intuitiver zu gestalten."

COM_PROCLAIM_TOUR_CPANEL_STEP2_TITLE="Unterstützung für den Dunkelmodus"
COM_PROCLAIM_TOUR_CPANEL_STEP2_DESC="Proclaim unterstützt jetzt vollständig den Dunkelmodus von Joomla! Das Control Panel und alle administrativen Oberflächen passen sich automatisch Ihrem bevorzugten Farbschema an."

; Accessibility Improvements Feature Steps
COM_PROCLAIM_TOUR_A11Y_STEP1_TITLE="Verbesserungen der Barrierefreiheit"
COM_PROCLAIM_TOUR_A11Y_STEP1_DESC="Diese Version enthält bedeutende Verbesserungen der Barrierefreiheit gemäß WCAG 2.1 Level A. Die Unterstützung für Bildschirmleseprogramme, die Tastaturnavigation und das Fokusmanagement wurden optimiert."

; Tour Completion
COM_PROCLAIM_TOUR_COMPLETE_TITLE="Tour abgeschlossen!"
COM_PROCLAIM_TOUR_COMPLETE_DESC="Sie haben die „Neuigkeiten“-Tour abgeschlossen! Weitere Informationen finden Sie in unserer Dokumentation unter christianwebministries.org. Bei Fragen besuchen Sie bitte unser Support-Forum."
