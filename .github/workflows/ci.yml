name: CI

on:
  push:
    branches: [ "development", "10.x" ]
    paths-ignore:
      - '**.md'
      - 'admin/language/**'
      - 'site/language/**'
      - 'build/mockups/**'
      - '.claude/**'
  pull_request:
    branches: [ "development", "10.x" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-checks:
    name: PHP Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, json, xml
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Clone joomla-cms for test framework
        run: git clone --depth 1 --branch 5.4-dev https://github.com/joomla/joomla-cms.git $GITHUB_WORKSPACE/../joomla-cms

      - name: Install Composer dependencies
        run: composer install --dev --no-interaction --prefer-dist

      - name: Check PHP syntax
        run: composer lint:syntax

      - name: Run PHPUnit tests
        run: composer test
        env:
          JOOMLA_CMS_PATH: /home/runner/work/Proclaim/joomla-cms

  js-checks:
    name: JS Lint & Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run Jest tests
        run: npm test
