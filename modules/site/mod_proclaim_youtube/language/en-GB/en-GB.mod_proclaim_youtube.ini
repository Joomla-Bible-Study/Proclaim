MOD_PROCLAIM_YOUTUBE="Proclaim YouTube"
MOD_PROCLAIM_YOUTUBE_DESCRIPTION="This module displays the latest live or uploaded video from a YouTube channel configured in Proclaim servers."

; Field labels
MOD_PROCLAIM_YOUTUBE_SERVER="YouTube Server"
MOD_PROCLAIM_YOUTUBE_SERVER_DESC="Select which YouTube server to use. Only servers configured with type 'youtube' are shown."
MOD_PROCLAIM_YOUTUBE_SELECT_SERVER="- Select a YouTube Server -"

MOD_PROCLAIM_YOUTUBE_PRIORITY="Video Priority"
MOD_PROCLAIM_YOUTUBE_PRIORITY_DESC="Choose how to select which video to display."
MOD_PROCLAIM_YOUTUBE_LIVE_FIRST="Live Stream First (fallback to latest)"
MOD_PROCLAIM_YOUTUBE_LATEST_ONLY="Latest Uploaded Only"
MOD_PROCLAIM_YOUTUBE_LIVE_ONLY="Live Stream Only"

MOD_PROCLAIM_YOUTUBE_SHOW_UPCOMING="Show Upcoming Streams"
MOD_PROCLAIM_YOUTUBE_SHOW_UPCOMING_DESC="Show scheduled/upcoming streams. If disabled, only currently live streams will be shown."

MOD_PROCLAIM_YOUTUBE_EXCLUDE_VIDEOS="Exclude Upcoming Videos"
MOD_PROCLAIM_YOUTUBE_EXCLUDE_VIDEOS_DESC="Select specific upcoming videos to exclude from display. These will only show when they are actually live."

MOD_PROCLAIM_YOUTUBE_DISPLAY_OPTIONS="Display Options"

MOD_PROCLAIM_YOUTUBE_WIDTH="Player Width"
MOD_PROCLAIM_YOUTUBE_WIDTH_DESC="Width of the embedded player in pixels."
MOD_PROCLAIM_YOUTUBE_HEIGHT="Player Height"
MOD_PROCLAIM_YOUTUBE_HEIGHT_DESC="Height of the embedded player in pixels."

MOD_PROCLAIM_YOUTUBE_RESPONSIVE="Responsive Player"
MOD_PROCLAIM_YOUTUBE_RESPONSIVE_DESC="Make the player responsive to fill its container width."

MOD_PROCLAIM_YOUTUBE_SHOW_TITLE="Show Video Title"
MOD_PROCLAIM_YOUTUBE_SHOW_TITLE_DESC="Display the video title above the player."

MOD_PROCLAIM_YOUTUBE_SHOW_DESC="Show Description"
MOD_PROCLAIM_YOUTUBE_SHOW_DESC_DESC="Display the video description below the player."
MOD_PROCLAIM_YOUTUBE_DESC_LENGTH="Description Length"
MOD_PROCLAIM_YOUTUBE_DESC_LENGTH_DESC="Maximum number of characters to show in the description."

MOD_PROCLAIM_YOUTUBE_SHOW_LIVE_BADGE="Show Live Badge"
MOD_PROCLAIM_YOUTUBE_SHOW_LIVE_BADGE_DESC="Display a badge when the video is live or upcoming."

MOD_PROCLAIM_YOUTUBE_AUTOPLAY_LIVE="Autoplay Live Streams"
MOD_PROCLAIM_YOUTUBE_AUTOPLAY_LIVE_DESC="Automatically start playing when a live stream is detected. Video will be muted due to browser restrictions."

MOD_PROCLAIM_YOUTUBE_AUTO_LINK="Auto-link to Messages"
MOD_PROCLAIM_YOUTUBE_AUTO_LINK_DESC="Automatically match YouTube video titles to Proclaim messages and display a link to the full message."

MOD_PROCLAIM_YOUTUBE_SHOW_NO_VIDEO="Show 'No Video' Message"
MOD_PROCLAIM_YOUTUBE_SHOW_NO_VIDEO_DESC="When no video is available, show a message instead of hiding the module. Default is to hide the module entirely."
MOD_PROCLAIM_YOUTUBE_NO_VIDEO_MSG="No Video Message"
MOD_PROCLAIM_YOUTUBE_NO_VIDEO_MSG_DESC="Custom message to display when no video is available. Leave empty for default."

MOD_PROCLAIM_YOUTUBE_CACHE_TIME_DESC="Time in seconds to cache the YouTube API response. Lower values mean more API calls."

MOD_PROCLAIM_YOUTUBE_POLL_INTERVAL="Status Poll Interval"
MOD_PROCLAIM_YOUTUBE_POLL_INTERVAL_DESC="How often (in seconds) to check if a live/upcoming video status has changed. Minimum 60 seconds. The interval automatically increases when no changes are detected to conserve API quota. Default: 120 seconds."

MOD_PROCLAIM_YOUTUBE_POLL_WINDOW_BEFORE="Poll Window Before Event"
MOD_PROCLAIM_YOUTUBE_POLL_WINDOW_BEFORE_DESC="Hours before the scheduled event start time to begin polling for status changes. Outside this window, no API calls are made. Default: 2 hours."
MOD_PROCLAIM_YOUTUBE_POLL_WINDOW_AFTER="Poll Window After Event"
MOD_PROCLAIM_YOUTUBE_POLL_WINDOW_AFTER_DESC="Hours after the scheduled event start time to continue polling. Once this window closes, polling stops entirely. Default: 1 hour."

