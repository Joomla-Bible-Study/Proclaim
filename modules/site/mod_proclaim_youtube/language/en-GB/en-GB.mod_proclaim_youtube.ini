MOD_PROCLAIM_YOUTUBE_LIVE_NOW="LIVE NOW"
MOD_PROCLAIM_YOUTUBE_UPCOMING="UPCOMING"
MOD_PROCLAIM_YOUTUBE_NO_VIDEO="No video currently available."
MOD_PROCLAIM_YOUTUBE_VIEW_MESSAGE="View Full Message"
MOD_PROCLAIM_YOUTUBE_BY_TEACHER="by %s"

